name: Deploy portfolio and Quartz

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Create clean output folder
        run: |
          rm -rf public
          mkdir -p public

      - name: Install homepage dependencies
        working-directory: home
        run: npm ci

      - name: Build React Vite homepage
        working-directory: home
        run: npm run build
        env:
          VITE_WEB3FORMS_ACCESS_KEY: ${{ secrets.VITE_WEB3FORMS_ACCESS_KEY }}


      - name: Copy homepage build to public
        run: |
          cp -r home/dist/. public/
          touch public/.nojekyll

      - name: Install Quartz dependencies
        working-directory: music-production-for-dummies/quartz
        run: npm ci

      - name: Install Quartz plugins
        working-directory: music-production-for-dummies/quartz
        run: npx quartz plugin install

      - name: Build Quartz
        working-directory: music-production-for-dummies/quartz
        run: npx quartz build -d ../content -o ../../public/music-production-for-dummies

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4