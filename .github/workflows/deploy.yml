name: Deploy portfolio and Quartz

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Create output folder
        run: |
          rm -rf dist
          mkdir -p dist

      - name: Copy portfolio homepage
        run: |
          cp -r public/. dist/
          touch dist/.nojekyll

      - name: Install Quartz dependencies
        working-directory: music-production-for-dummies/quartz
        run: npm install

      - name: Build Quartz
        working-directory: music-production-for-dummies/quartz
        run: npx quartz build -d ../content -o ../../dist/music-production-for-dummies

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4